name: Dependency Review

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Block PRs that introduce packages with HIGH or CRITICAL vulnerabilities.
          fail-on-severity: high
          # Comment on the PR with a summary of new dependencies and their licenses.
          comment-summary-in-pr: always
          # Deny packages with these licenses (non-permissive or incompatible with MIT).
          deny-licenses: GPL-3.0, AGPL-3.0
