name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    name: "Python ${{ matrix.python-version }} / ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest --cov=tokenwise --cov-report=term-missing --cov-fail-under=80

      - name: Upload coverage report
        if: matrix.python-version == '3.13' && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: ruff check
        run: ruff check src/ tests/

      - name: ruff format (check only)
        run: ruff format --check src/ tests/

      - name: mypy
        run: mypy src/

  security:
    name: Security audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: bandit static analysis
        run: bandit -r src/ -c pyproject.toml

      - name: pip-audit (vulnerability scan)
        # CVE-2026-3219 and CVE-2026-6357 affect pip itself; not a tokenwise dependency.
        # --skip-editable excludes the local tokenwise-cli package (not on PyPI).
        run: pip-audit --skip-editable --ignore-vuln CVE-2026-3219 --ignore-vuln CVE-2026-6357

      - name: Grep check — no network imports
        run: |
          echo "Checking for forbidden network imports..."
          if grep -rE "import (requests|urllib|httpx|socket|http\.client|aiohttp|ssl)" src/; then
            echo "FAIL: network import found in src/"
            exit 1
          fi
          echo "OK: no network imports found"

      - name: Grep check — no eval/exec/pickle/subprocess
        run: |
          echo "Checking for forbidden execution primitives..."
          if grep -rE "\b(eval|exec|pickle|subprocess|os\.system)\(" src/; then
            echo "FAIL: forbidden execution primitive found in src/"
            exit 1
          fi
          echo "OK: no forbidden execution primitives found"
